<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spendly — Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff9f0;
    --white: #ffffff;
    --border: #f0e8d8;
    --text: #2d2416;
    --muted: #9e8e78;
    --accent: #ff6b35;
    --accent2: #7c3aed;
    --accent3: #0ea5e9;
    --accent4: #10b981;
    --yellow: #fbbf24;
    --pink: #ec4899;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }

  /* Fun dotted background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #e8d8c4 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    padding: 2.5rem 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    transform: rotate(-4deg);
    box-shadow: 3px 3px 0 #c94e20;
  }

  .logo h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.03em;
  }

  .logo h1 span { color: var(--accent); }

  .header-pills {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .pill {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 50px;
    padding: 0.4rem 1rem;
    font-size: 0.8rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    box-shadow: 2px 2px 0 var(--border);
  }

  .pill .pill-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* STAT CARDS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 1.2rem 1.4rem;
    box-shadow: 3px 3px 0 var(--border);
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 70px; height: 70px;
    border-radius: 50%;
    opacity: 0.12;
  }

  .stat-card.orange::before { background: var(--accent); }
  .stat-card.purple::before { background: var(--accent2); }
  .stat-card.blue::before { background: var(--accent3); }
  .stat-card.green::before { background: var(--accent4); }

  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 0.4rem;
  }

  .stat-value {
    font-family: 'Nunito', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }

  .stat-card.orange .stat-value { color: var(--accent); }
  .stat-card.purple .stat-value { color: var(--accent2); }
  .stat-card.green .stat-value { color: var(--accent4); }

  /* GRID */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 1.5rem;
    align-items: start;
  }

  /* CARD */
  .card {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 20px;
    box-shadow: 4px 4px 0 var(--border);
    overflow: hidden;
  }

  .card-header {
    padding: 1rem 1.4rem;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: var(--text);
  }

  .count-badge {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 50px;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.15rem 0.7rem;
    color: var(--muted);
  }

  /* EXPENSE ITEMS */
  .expense-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.4rem;
    border-bottom: 2px solid var(--border);
    transition: background 0.15s;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.92) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .expense-item:last-child { border-bottom: none; }
  .expense-item:hover { background: var(--bg); }

  .cat-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    border: 2px solid transparent;
  }

  .expense-info { flex: 1; min-width: 0; }

  .expense-name {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .expense-sub {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.15rem;
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .cat-tag {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.1rem 0.45rem;
    border-radius: 50px;
  }

  .expense-amount {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: var(--text);
    white-space: nowrap;
  }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 1.1rem;
    padding: 0.2rem;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
  }

  .del-btn:hover { color: #ef4444; background: #fef2f2; }

  .empty-state {
    padding: 3.5rem 1.5rem;
    text-align: center;
  }

  .empty-emoji { font-size: 3rem; display: block; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 0.85rem; color: var(--muted); font-weight: 500; }

  /* FORM */
  .form-body { padding: 1.2rem 1.4rem; }

  .field { margin-bottom: 1rem; }

  .field label {
    display: block;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  .field input, .field select {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.65rem 0.9rem;
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
  }

  .field input::placeholder { color: #c8b89e; }
  .field select option { background: white; }

  .add-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: 2px solid #c94e20;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    padding: 0.8rem;
    cursor: pointer;
    border-radius: 14px;
    box-shadow: 0 3px 0 #c94e20;
    transition: transform 0.1s, box-shadow 0.1s;
    margin-top: 0.3rem;
  }

  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 0 #c94e20; }
  .add-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #c94e20; }

  /* BREAKDOWN */
  .breakdown-item { margin-bottom: 0.85rem; }

  .breakdown-top {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    font-weight: 600;
    margin-bottom: 0.35rem;
    text-transform: capitalize;
  }

  .breakdown-pct { color: var(--muted); font-weight: 500; }

  .bar-track {
    height: 8px;
    background: var(--bg);
    border-radius: 50px;
    border: 2px solid var(--border);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 50px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.7rem 1.4rem;
    border-radius: 50px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  @media (max-width: 700px) {
    .main-grid { grid-template-columns: 1fr; }
    .header-pills { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">💸</div>
      <h1>Spend<span>ly</span></h1>
    </div>
    <div class="header-pills">
      <div class="pill"><div class="pill-dot" style="background:#10b981"></div> Tracking active</div>
      <div class="pill">📅 <span id="today-date"></span></div>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card orange">
      <div class="stat-label">Total spent</div>
      <div class="stat-value" id="total-val">$0.00</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-label">Entries</div>
      <div class="stat-value" id="count-val">0</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Top category</div>
      <div class="stat-value" style="font-size:1.1rem;color:var(--accent3)" id="top-cat">—</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Average</div>
      <div class="stat-value" id="avg-val">$0.00</div>
    </div>
  </div>

  <div class="main-grid">

    <!-- LEFT -->
    <div style="display:flex;flex-direction:column;gap:1.5rem;">

      <div class="card">
        <div class="card-header">
          <span class="card-title">💰 My Expenses</span>
          <span class="count-badge" id="entry-badge">0 entries</span>
        </div>
        <div id="expense-list">
          <div class="empty-state">
            <span class="empty-emoji">🧾</span>
            <p>No expenses yet — add your first one!</p>
          </div>
        </div>
      </div>

      <div class="card" id="breakdown-card">
        <div class="card-header">
          <span class="card-title">📊 By Category</span>
        </div>
        <div class="form-body" id="breakdown-body">
          <p style="font-size:0.8rem;color:var(--muted);text-align:center;padding:0.5rem 0">Add expenses to see breakdown</p>
        </div>
      </div>

    </div>

    <!-- RIGHT: Form -->
    <div class="card" style="position:sticky;top:1.5rem;">
      <div class="card-header">
        <span class="card-title">✏️ Add Expense</span>
      </div>
      <div class="form-body">
        <div class="field">
          <label>Description</label>
          <input type="text" id="inp-name" placeholder="What did you spend on?" />
        </div>
        <div class="field">
          <label>Amount ($)</label>
          <input type="number" id="inp-amount" placeholder="0.00" min="0.01" step="0.01" />
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="inp-date" />
        </div>
        <div class="field">
          <label>Category</label>
          <select id="inp-category">
            <option value="">— Pick a category —</option>
            <option value="food">🍔 Food</option>
            <option value="groceries">🛒 Groceries</option>
            <option value="rent">🏠 Rent</option>
            <option value="utilities">💡 Utilities</option>
            <option value="transport">🚗 Transport</option>
            <option value="gas">⛽ Gas</option>
            <option value="insurance">🛡️ Insurance</option>
            <option value="subscriptions">📱 Subscriptions</option>
            <option value="entertainment">🎮 Entertainment</option>
            <option value="shopping">🛍️ Shopping</option>
            <option value="health">💊 Health</option>
            <option value="education">📚 Education</option>
          </select>
        </div>
        <button class="add-btn" onclick="addExpense()">+ Add Expense</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const CAT_CONFIG = {
    food:          { emoji:'🍔', bg:'#fff3e0', border:'#ffd180', text:'#e65100', bar:'#ff9800' },
    groceries:     { emoji:'🛒', bg:'#e8f5e9', border:'#a5d6a7', text:'#1b5e20', bar:'#4caf50' },
    rent:          { emoji:'🏠', bg:'#fce4ec', border:'#f48fb1', text:'#880e4f', bar:'#e91e63' },
    utilities:     { emoji:'💡', bg:'#fffde7', border:'#fff176', text:'#f57f17', bar:'#ffeb3b' },
    transport:     { emoji:'🚗', bg:'#e3f2fd', border:'#90caf9', text:'#0d47a1', bar:'#2196f3' },
    gas:           { emoji:'⛽', bg:'#e8eaf6', border:'#9fa8da', text:'#1a237e', bar:'#3f51b5' },
    insurance:     { emoji:'🛡️', bg:'#e0f7fa', border:'#80deea', text:'#006064', bar:'#00bcd4' },
    subscriptions: { emoji:'📱', bg:'#f3e5f5', border:'#ce93d8', text:'#4a148c', bar:'#9c27b0' },
    entertainment: { emoji:'🎮', bg:'#fce4ec', border:'#f48fb1', text:'#880e4f', bar:'#e91e63' },
    shopping:      { emoji:'🛍️', bg:'#fff8e1', border:'#ffe082', text:'#ff6f00', bar:'#ffc107' },
    health:        { emoji:'💊', bg:'#e8f5e9', border:'#a5d6a7', text:'#1b5e20', bar:'#66bb6a' },
    education:     { emoji:'📚', bg:'#e3f2fd', border:'#90caf9', text:'#0d47a1', bar:'#42a5f5' },
  };

  const API_URL = 'http://127.0.0.1:5000/api/expenses';

  let expenses = [];

  document.getElementById('inp-date').valueAsDate = new Date();
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

  function fmt(n) {
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
  }

  function render() {
    const total = expenses.reduce((s,e) => s + Number(e.amount), 0);
    const count = expenses.length;
    const avg = count ? total / count : 0;

    document.getElementById('total-val').textContent = fmt(total);
    document.getElementById('count-val').textContent = count;
    document.getElementById('avg-val').textContent = fmt(avg);
    document.getElementById('entry-badge').textContent = count + ' ' + (count===1?'entry':'entries');

    // Top category
    const cats = {};
    expenses.forEach(e => { cats[e.category] = (cats[e.category]||0) + Number(e.amount); });
    const topCat = Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('top-cat').textContent = topCat ? (CAT_CONFIG[topCat[0]]?.emoji||'') + ' ' + topCat[0] : '—';

    // Expense list
    const list = document.getElementById('expense-list');
    if (!count) {
      list.innerHTML = `<div class="empty-state"><span class="empty-emoji">🧾</span><p>No expenses yet — add your first one!</p></div>`;
    } else {
      const sorted = [...expenses].sort((a,b) => new Date(b.date) - new Date(a.date));
      list.innerHTML = sorted.map((e, i) => {
        const cfg = CAT_CONFIG[e.category] || { emoji:'💰', bg:'#f5f5f5', border:'#e0e0e0', text:'#616161', bar:'#9e9e9e' };
        return `
        <div class="expense-item" style="animation-delay:${i*0.04}s">
          <div class="cat-icon" style="background:${cfg.bg};border-color:${cfg.border}">${cfg.emoji}</div>
          <div class="expense-info">
            <div class="expense-name">${e.name}</div>
            <div class="expense-sub">
              <span>${e.date}</span>
              <span class="cat-tag" style="background:${cfg.bg};color:${cfg.text}">${e.category}</span>
            </div>
          </div>
          <div class="expense-amount">${fmt(e.amount)}</div>
          <button class="del-btn" onclick="deleteExpense('${e.name.replace(/'/g,"\\'")}','${e.date}')" title="Remove">✕</button>
        </div>`;
      }).join('');
    }

    // Breakdown
    const bd = document.getElementById('breakdown-body');
    if (!count) {
      bd.innerHTML = `<p style="font-size:0.8rem;color:var(--muted);text-align:center;padding:0.5rem 0">Add expenses to see breakdown</p>`;
      return;
    }
    const sortedCats = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
    bd.innerHTML = sortedCats.map(([cat, amt]) => {
      const cfg = CAT_CONFIG[cat] || { bar:'#9e9e9e', text:'#616161' };
      const pct = Math.round(amt/total*100);
      return `
      <div class="breakdown-item">
        <div class="breakdown-top">
          <span>${CAT_CONFIG[cat]?.emoji||''} ${cat}</span>
          <span class="breakdown-pct">${fmt(amt)} · ${pct}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${cfg.bar}"></div>
        </div>
      </div>`;
    }).join('');
  }

  // Fetches the current expense list from the Flask API and re-renders the page.
  // This replaces the old approach of just reading the local `expenses` array,
  // since the array no longer holds the "real" data — the server/data.json does.
  async function loadExpenses() {
    try {
      const response = await fetch(API_URL);
      const data = await response.json();
      expenses = data.expenses;
      render();
    } catch (err) {
      console.error('Failed to load expenses:', err);
      showToast('⚠️ Could not reach server');
    }
  }

  async function addExpense() {
    const name = document.getElementById('inp-name').value.trim();
    const amount = parseFloat(document.getElementById('inp-amount').value);
    const date = document.getElementById('inp-date').value;
    const category = document.getElementById('inp-category').value;

    if (!name) return showToast('✏️ Enter a description');
    if (!amount || amount <= 0) return showToast('💵 Enter a valid amount');
    if (!date) return showToast('📅 Pick a date');
    if (!category) return showToast('🏷️ Pick a category');

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, amount, date, category })
      });

      if (!response.ok) {
        // response.ok is false for any 4xx/5xx status — e.g. your 400 validation errors
        const errorData = await response.json();
        return showToast('❌ ' + (errorData.message || 'Failed to add expense'));
      }

      showToast('✅ Expense added!');

      document.getElementById('inp-name').value = '';
      document.getElementById('inp-amount').value = '';
      document.getElementById('inp-category').value = '';
      document.getElementById('inp-date').valueAsDate = new Date();

      // Re-fetch the full list from the server so it reflects what's actually saved,
      // instead of guessing what the new state looks like on the frontend.
      await loadExpenses();
    } catch (err) {
      console.error('Failed to add expense:', err);
      showToast('⚠️ Could not reach server');
    }
  }

  async function deleteExpense(name, date) {
    try {
      const response = await fetch(API_URL, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, date })
      });

      if (!response.ok) {
        // Covers your 404 "not found" case and any 400s
        const errorData = await response.json();
        return showToast('❌ ' + (errorData.message || 'Failed to delete expense'));
      }

      showToast('🗑️ Entry removed');
      await loadExpenses();
    } catch (err) {
      console.error('Failed to delete expense:', err);
      showToast('⚠️ Could not reach server');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  loadExpenses();
</script>
</body>
</html>
